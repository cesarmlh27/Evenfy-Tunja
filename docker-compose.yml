version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: evenfy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evenfy_db
      POSTGRES_USER: user_api
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_api -d evenfy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evenfy-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/evenfy_db
      DB_USERNAME: user_api
      DB_PASSWORD: 1234
      JWT_SECRET: dev-only-change-this-secret
      JWT_EXPIRATION: 86400000
      MAIL_USERNAME: dev@example.com
      MAIL_PASSWORD: dev-password
      RESEND_API_KEY: dev-resend-key
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: evenfy-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  postgres_data:
